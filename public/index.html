<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doc Reader</title>
  <link rel="stylesheet" href="/lib/katex/dist/katex.min.css">
  <link rel="stylesheet" id="hljs-theme" href="/lib/@highlightjs/cdn-assets/styles/github.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <button id="menu-toggle" class="edge-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>

  <button id="toc-toggle" class="edge-toggle" title="Toggle contents" aria-label="Toggle contents">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
  </button>

  <div id="toolbar">
    <button class="toolbar-trigger" title="Settings" aria-label="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <div class="toolbar-panel">
      <div class="width-toggle">
        <button data-width="800" class="wbtn" title="Narrow">═</button>
        <button data-width="1100" class="wbtn active" title="Wide">══</button>
        <button data-width="0" class="wbtn" title="Full">═══</button>
      </div>
      <button id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>

  <div id="overlay"></div>

  <div id="mermaid-modal" class="mermaid-modal">
    <div class="mm-toolbar">
      <span class="mm-zoom-label">100%</span>
      <button class="mm-btn mm-close" title="Close">×</button>
    </div>
    <div class="mm-viewport">
      <div class="mm-stage"></div>
    </div>
  </div>

  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-tree"></div>
    </aside>
    <div id="resize-handle"></div>
    <div id="main">
      <main id="content">
        <div class="loading"></div>
      </main>
      <div class="toc-column">
        <div id="toc-resize-handle"></div>
        <aside id="toc-panel">
          <div class="toc-title">Content</div>
          <nav id="toc"></nav>
        </aside>
      </div>
    </div>
  </div>

  <script src="/lib/marked/marked.min.js"></script>
  <script src="/lib/katex/dist/katex.min.js"></script>
  <script src="/lib/mermaid/dist/mermaid.min.js"></script>
  <script src="/lib/@highlightjs/cdn-assets/highlight.min.js"></script>
  <script src="/js/renderer.js"></script>
  <script src="/js/toc.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
